<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | AWS Media</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script type="module" src="assets/js/auth.js"></script>
  </head>
  <body class="auth-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="brand-mark">A</span>
        <span>AWS Media</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="login.html">Login</a>
      </nav>
    </header>

    <main class="auth-layout two-column">
      <section class="auth-card">
        <p class="eyebrow">Password help</p>
        <h1>Send reset code</h1>
        <form id="forgot-form" class="stacked-form">
          <label>
            Email
            <input id="forgot-email" name="email" type="email" autocomplete="email" required>
          </label>
          <button class="button" type="submit">Send code</button>
          <p id="forgot-message" class="form-message" role="status"></p>
        </form>
      </section>

      <section class="auth-card">
        <p class="eyebrow">Create new password</p>
        <h2>Reset password</h2>
        <form id="reset-form" class="stacked-form">
          <label>
            Email
            <input id="reset-email" name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Reset code
            <input id="reset-code" name="code" type="text" inputmode="numeric" required>
          </label>
          <label>
            New password
            <input id="reset-password" name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button class="button secondary" type="submit">Reset password</button>
          <p id="reset-message" class="form-message" role="status"></p>
        </form>
      </section>
    </main>
  </body>
</html>
