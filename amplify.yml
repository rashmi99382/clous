version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - login.html
      - signup.html
      - forgot-password.html
      - dashboard.html
      - assets/**/*
  cache:
    paths: []
